name: Azure Static Web Apps CI/CD (frontend)

on:
  push:
    branches:
      - main
      - PROD-Catalogos_v1
    paths-ignore:
      - 'TI_water_api/**'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
      - PROD-Catalogos_v1
    paths-ignore:
      - 'TI_water_api/**'

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      # Build on the runner so VITE_* are injected (Oryx often does not see job env).
      # VITE_API_BASE_URL example: https://tiwatermx-api-hgaua5f6bycshrc5.australiaeast-01.azurewebsites.net/api/v2.0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install and build frontend
        run: npm ci && npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_API_BASE_URL_TIWATER: ${{ secrets.VITE_API_BASE_URL_TIWATER }}
          VITE_TIWATER_API_KEY: ${{ secrets.VITE_TIWATER_API_KEY }}

      - name: Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "upload"
          skip_app_build: true
          app_location: "dist"
          api_location: ""

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"
          app_location: "/"
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
