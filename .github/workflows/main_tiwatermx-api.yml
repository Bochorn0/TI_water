# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - tiwatermx-api

on:
  push:
    branches:
      - main
    paths:
      - 'TI_water_api/**'
      - '.github/workflows/main_tiwatermx-api.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      # Production deps only; ship node_modules so Azure does not rely on Oryx tar extract
      - name: npm ci (production)
        working-directory: TI_water_api
        run: npm ci --omit=dev

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: TI_water_api
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2042A7D5FF38440D982A73962A81D857 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_23A0C6807B974C208B09317A724A1CF3 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1AC08C5A69B44FE891106D65BDA6D345 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'tiwatermx-api'
          slot-name: 'Production'
          package: .
          startup-command: 'node src/index.js'